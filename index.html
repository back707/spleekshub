<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Queue</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#login{
background:#1e293b;
padding:40px;
border-radius:10px;
text-align:center;
}

#app{display:none;width:1100px;}

.board{
display:flex;
gap:30px;
}

.column{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
}

.card{
background:#334155;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tags span{
font-size:11px;
padding:3px 6px;
border-radius:6px;
margin-right:4px;
}

.ACTIVE{background:#22c55e;}
.EARLY_ACCESS{background:#a855f7;}
.UNRELEASED{background:#3b82f6;}

button{
border:none;
border-radius:6px;
padding:5px 8px;
cursor:pointer;
}

.move{background:#10b981;color:white;}
.undo{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}

.addbox{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
padding:6px;
border-radius:6px;
border:none;
margin-right:6px;
}

</style>
</head>

<body>

<div id="login">
<h2>Game Queue</h2>
<input type="password" id="pw">
<button onclick="login()">Enter</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app">

<div class="addbox">

<input id="name" placeholder="Game name">

<select id="tag1">
<option value="">Tag1</option>
<option value="ACTIVE">ACTIVE</option>
<option value="EARLY_ACCESS">EARLY ACCESS</option>
<option value="UNRELEASED">UNRELEASED</option>
</select>

<select id="tag2">
<option value="">Tag2</option>
<option value="ACTIVE">ACTIVE</option>
<option value="EARLY_ACCESS">EARLY ACCESS</option>
<option value="UNRELEASED">UNRELEASED</option>
</select>

<button onclick="addGame()">Add Game</button>
<button onclick="resetData()">Reset List</button>

</div>

<div class="board">

<div class="column">
<h2>Queue</h2>
<div id="queue"></div>
</div>

<div class="column">
<h2>Completed</h2>
<div id="completed"></div>
</div>

</div>

</div>

<script>

const PASSWORD="goop"

function login(){

if(document.getElementById("pw").value===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

init()

}else{

document.getElementById("error").innerText="Incorrect password"

}

}

/* DEFAULT DATA */

const defaultQueue=[
{name:"ASA: The Island",tags:["ACTIVE"]},
{name:"Abiotic Factor",tags:[]},
{name:"Hell Divers 2",tags:[]},
{name:"Core Keeper",tags:[]},
{name:"Grounded 2",tags:["EARLY_ACCESS"]},
{name:"Subnautica 2",tags:["UNRELEASED"]}
]

const defaultCompleted=[
{name:"Sons of the Forest",tags:[]},
{name:"Grounded",tags:[]}
]

let queue=[]
let completed=[]

function init(){

queue=JSON.parse(localStorage.getItem("queue"))
completed=JSON.parse(localStorage.getItem("completed"))

if(!queue){queue=[...defaultQueue]}
if(!completed){completed=[...defaultCompleted]}

render()

}

/* SAVE */

function save(){

localStorage.setItem("queue",JSON.stringify(queue))
localStorage.setItem("completed",JSON.stringify(completed))

}

/* RENDER */

function render(){

const q=document.getElementById("queue")
const c=document.getElementById("completed")

q.innerHTML=""
c.innerHTML=""

/* queue */

queue.forEach((g,i)=>{

let tagHTML=""

g.tags.forEach(t=>{
tagHTML+=`<span class="${t}">${t.replace("_"," ")}</span>`
})

q.innerHTML+=`
<div class="card">

<div>
<div>${g.name}</div>
<div class="tags">${tagHTML}</div>
</div>

<div>
<button class="move" onclick="completeGame(${i})">✓</button>
<button onclick="editTags(${i})">🏷</button>
<button class="delete" onclick="deleteGame(${i})">✖</button>
</div>

</div>
`

})

/* completed */

completed.forEach((g,i)=>{

let tagHTML=""

g.tags.forEach(t=>{
tagHTML+=`<span class="${t}">${t.replace("_"," ")}</span>`
})

c.innerHTML+=`
<div class="card">

<div>
<div>${g.name}</div>
<div class="tags">${tagHTML}</div>
</div>

<div>
<button class="undo" onclick="undoGame(${i})">↺</button>
<button class="delete" onclick="deleteCompleted(${i})">✖</button>
</div>

</div>
`

})

save()

}

/* ADD */

function addGame(){

let name=document.getElementById("name").value.trim()

if(!name) return

let tags=[
document.getElementById("tag1").value,
document.getElementById("tag2").value
].filter(t=>t)

tags=[...new Set(tags)].slice(0,2)

/* enforce one ACTIVE */

if(tags.includes("ACTIVE")){
queue.forEach(g=>{
g.tags=g.tags.filter(t=>t!=="ACTIVE")
})
}

queue.push({name,tags})

document.getElementById("name").value=""

render()

}

/* EDIT TAGS */

function editTags(i){

let t1=prompt("Tag1: ACTIVE / EARLY_ACCESS / UNRELEASED")
let t2=prompt("Tag2")

let tags=[t1,t2].filter(t=>t)

tags=[...new Set(tags)].slice(0,2)

if(tags.includes("ACTIVE")){
queue.forEach(g=>{
g.tags=g.tags.filter(t=>t!=="ACTIVE")
})
}

queue[i].tags=tags

render()

}

/* MOVE */

function completeGame(i){

completed.push(queue[i])
queue.splice(i,1)

render()

}

function undoGame(i){

queue.push(completed[i])
completed.splice(i,1)

render()

}

/* DELETE */

function deleteGame(i){

queue.splice(i,1)

render()

}

function deleteCompleted(i){

completed.splice(i,1)

render()

}

/* RESET */

function resetData(){

localStorage.removeItem("queue")
localStorage.removeItem("completed")

location.reload()

}

</script>

</body>
</html>
