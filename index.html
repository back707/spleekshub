<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #070709;
      --bg-gradient: radial-gradient(circle at 50% 30%, #1a1a24 0%, #050505 100%);
      --panel-bg: rgba(20, 20, 25, 0.7);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #e0e0e0;
      --text-muted: #666670;
      --accent-glow: #e63946;
      --accent-glow-intense: #ff4d5a;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg-dark);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 8vh;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Sized for desktop presence */
    .list-container {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      width: 100%;
      max-width: 800px;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02);
      padding: 50px 60px;
      box-sizing: border-box;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 0;
      margin-bottom: 40px;
      color: #ffffff;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 30px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      padding: 20px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      opacity: 1;
      transform: translateX(0);
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: rgba(255, 255, 255, 0.02);
      transform: scale(1.01);
    }

    /* Dramatic Checkbox */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border: 1px solid var(--text-muted);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 2px;
      margin-right: 25px;
      cursor: pointer;
      display: grid;
      place-content: center;
      transition: all 0.3s ease;
      position: relative;
      flex-shrink: 0;
    }

    input[type="checkbox"]::before {
      content: "";
      width: 14px;
      height: 14px;
      transform: scale(0);
      transition: 0.3s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background-color: transparent;
      box-shadow: inset 1em 1em var(--bg-dark);
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    input[type="checkbox"]:hover {
      border-color: var(--text-main);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    input[type="checkbox"]:checked {
      background-color: var(--accent-glow);
      border-color: var(--accent-glow-intense);
      box-shadow: 0 0 20px rgba(230, 57, 70, 0.6);
    }

    input[type="checkbox"]:checked::before {
      transform: scale(1);
    }

    /* Typography & Animation */
    .item-text {
      position: relative;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 1px;
      cursor: pointer;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    /* The Glowing Red Strikethrough */
    .item-text::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      height: 2px;
      background: var(--accent-glow-intense);
      box-shadow: 0 0 8px var(--accent-glow-intense);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.86, 0, 0.07, 1);
    }

    /* Active Animation States */
    li.checked .item-text {
      color: var(--text-muted);
      font-style: italic;
    }

    li.checked .item-text::after {
      width: 100%;
    }

    li.fade-out {
      opacity: 0;
      transform: translateX(50px) scale(0.95);
      pointer-events: none;
    }

    .loader {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <div class="list-container">
    <h1>The List</h1>
    <div id="loader" class="loader">Summoning Data...</div>
    <ul id="list"></ul>
  </div>

  <script>
    // --- IMPORTANT: Paste your Apps Script Web App URL below ---
    const SCRIPT_URL = 'YOUR_WEB_APP_URL_HERE';
    
    const listElement = document.getElementById('list');
    const loaderElement = document.getElementById('loader');

    // Fetch initial items on load
    async function loadItems() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getItems`);
        const items = await response.json();
        
        loaderElement.style.display = 'none';
        
        if (items.length === 0) {
          listElement.innerHTML = '<li style="color: var(--text-muted); border: none; justify-content: center; font-style: italic;">The list is empty.</li>';
          return;
        }

        items.forEach(item => {
          createListItem(item);
        });
      } catch (error) {
        loaderElement.innerText = 'Failed to load list.';
        console.error('Error fetching list:', error);
      }
    }

    // Build the DOM elements
    function createListItem(text) {
      const li = document.createElement('li');
      
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      
      const span = document.createElement('span');
      span.className = 'item-text';
      span.innerText = text;

      // Allow clicking the text to check the box
      span.addEventListener('click', () => {
        if(!checkbox.disabled) {
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
        }
      });

      checkbox.addEventListener('change', async function() {
        if (this.checked) {
          // 1. Trigger Strikethrough
          li.classList.add('checked');
          this.disabled = true; // Prevent multiple clicks

          // 2. Wait for strikethrough, then trigger fade out
          setTimeout(() => {
            li.classList.add('fade-out');
          }, 500); // Increased slightly for dramatic effect

          // 3. Remove from UI and fire off the delete request
          setTimeout(async () => {
            li.remove();
            
            // Background deletion call to Google Sheet
            try {
              await fetch(`${SCRIPT_URL}?action=deleteItem&item=${encodeURIComponent(text)}`);
            } catch (err) {
              console.error('Failed to delete from sheet:', err);
            }
          }, 1000); // 1000ms total delay before DOM removal
        }
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      listElement.appendChild(li);
    }

    // Initialize
    loadItems();
  </script>

</body>
</html>
