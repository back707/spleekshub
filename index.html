<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The List</title>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --card-bg: #ffffff;
      --text-color: #333333;
      --accent-color: #4CAF50;
      --border-color: #eeeeee;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding-top: 50px;
      margin: 0;
      min-height: 100vh;
    }

    .list-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 30px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-color);
      transition: all 0.4s ease;
      opacity: 1;
      transform: translateX(0);
    }

    li:last-child {
      border-bottom: none;
    }

    /* Custom Checkbox */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #ccc;
      border-radius: 4px;
      margin-right: 15px;
      cursor: pointer;
      display: grid;
      place-content: center;
      transition: all 0.2s ease;
    }

    input[type="checkbox"]::before {
      content: "";
      width: 12px;
      height: 12px;
      transform: scale(0);
      transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em white;
      background-color: transform;
      transform-origin: center;
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    input[type="checkbox"]:checked {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
    }

    input[type="checkbox"]:checked::before {
      transform: scale(1);
    }

    /* Strikethrough Animation Container */
    .item-text {
      position: relative;
      font-size: 16px;
      cursor: pointer;
    }

    /* The Animated Line */
    .item-text::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      height: 2px;
      background: #888;
      width: 0%;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Active Animation States */
    li.checked .item-text {
      color: #888;
    }

    li.checked .item-text::after {
      width: 100%;
    }

    li.fade-out {
      opacity: 0;
      transform: translateX(30px);
      pointer-events: none;
    }

    .loader {
      text-align: center;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="list-container">
    <h1>The List</h1>
    <div id="loader" class="loader">Fetching items...</div>
    <ul id="list"></ul>
  </div>

  <script>
    // --- IMPORTANT: Paste your copied Apps Script Web App URL below ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBARe3mhSvd_bx0IkOYaTFNfQFzOJ330SSdA5LBAGJ7vlwJb5YmOpEPpcos7wrNF0D/exec';
    
    const listElement = document.getElementById('list');
    const loaderElement = document.getElementById('loader');

    // Fetch initial items on load
    async function loadItems() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getItems`);
        const items = await response.json();
        
        loaderElement.style.display = 'none';
        
        if (items.length === 0) {
          listElement.innerHTML = '<li style="color: #888; border: none;">The list is empty.</li>';
          return;
        }

        items.forEach(item => {
          createListItem(item);
        });
      } catch (error) {
        loaderElement.innerText = 'Failed to load list.';
        console.error('Error fetching list:', error);
      }
    }

    // Build the DOM elements
    function createListItem(text) {
      const li = document.createElement('li');
      
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      
      const span = document.createElement('span');
      span.className = 'item-text';
      span.innerText = text;

      // Allow clicking the text to check the box
      span.addEventListener('click', () => {
        checkbox.checked = !checkbox.checked;
        checkbox.dispatchEvent(new Event('change'));
      });

      checkbox.addEventListener('change', async function() {
        if (this.checked) {
          // 1. Trigger Strikethrough
          li.classList.add('checked');
          this.disabled = true; // Prevent multiple clicks

          // 2. Wait for strikethrough, then trigger fade out
          setTimeout(() => {
            li.classList.add('fade-out');
          }, 400); // 400ms delay

          // 3. Remove from UI and fire off the delete request
          setTimeout(async () => {
            li.remove();
            
            // Background deletion call to Google Sheet
            try {
              await fetch(`${SCRIPT_URL}?action=deleteItem&item=${encodeURIComponent(text)}`);
            } catch (err) {
              console.error('Failed to delete from sheet:', err);
            }
          }, 800); // 800ms total delay before DOM removal
        }
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      listElement.appendChild(li);
    }

    // Initialize
    loadItems();
  </script>

</body>
</html>
