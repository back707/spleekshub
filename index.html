<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survival Game Queue</title>

<style>

body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(140deg,#111827,#1f2937);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN */

#loginBox{
background:#1f2937;
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
text-align:center;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

button{
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

#error{color:#ff6b6b;margin-top:10px;}

/* APP */

#app{display:none;width:1200px;}

.board{
display:flex;
gap:30px;
}

.column{
background:#1f2937;
flex:1;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.card{
background:#374151;
border-radius:8px;
padding:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tags span{
font-size:11px;
padding:3px 6px;
border-radius:6px;
margin-right:4px;
}

.ACTIVE{background:#22c55e;}
.EARLY_ACCESS{background:#a855f7;}
.UNRELEASED{background:#3b82f6;}

.controls button{
margin-left:4px;
}

.moveBtn{background:#10b981;color:white;}
.undoBtn{background:#f59e0b;color:white;}
.deleteBtn{background:#ef4444;color:white;}

.addBox{
background:#111827;
padding:10px;
border-radius:8px;
margin-bottom:15px;
}

.addBox input{
width:40%;
}

</style>
</head>

<body>

<div id="loginBox">
<h2>Game Queue Access</h2>
<input type="password" id="password">
<button onclick="login()">Enter</button>
<div id="error"></div>
</div>

<div id="app">

<div class="addBox">

<input id="newName" placeholder="Add new game">

<select id="tag1">
<option value="">Tag 1</option>
<option>ACTIVE</option>
<option>EARLY_ACCESS</option>
<option>UNRELEASED</option>
</select>

<select id="tag2">
<option value="">Tag 2</option>
<option>ACTIVE</option>
<option>EARLY_ACCESS</option>
<option>UNRELEASED</option>
</select>

<button onclick="addGame()">Add Game</button>

</div>

<div class="board">

<div class="column">
<h2>Game Queue</h2>
<div id="queue"></div>
</div>

<div class="column">
<h2>Completed</h2>
<div id="completed"></div>
</div>

</div>
</div>

<script>

const PASSWORD="goop"

/* LOGIN */

function login(){
const pass=document.getElementById("password").value
if(pass===PASSWORD){
document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
load()
}else{
document.getElementById("error").innerText="Incorrect password"
}
}

/* DEFAULT DATA */

const defaultQueue=[
{name:"ASA: The Island",tags:["ACTIVE"]},
{name:"Abiotic Factor",tags:[]},
{name:"Hell Divers 2",tags:[]},
{name:"Core Keeper",tags:[]},
{name:"Grounded 2",tags:["EARLY_ACCESS"]},
{name:"Subnautica 2",tags:["UNRELEASED"]}
]

const defaultCompleted=[
{name:"Sons of the Forest",tags:[]},
{name:"Grounded",tags:[]}
]

let queue=[]
let completed=[]

/* STORAGE */

function load(){
queue=JSON.parse(localStorage.getItem("queue"))||defaultQueue
completed=JSON.parse(localStorage.getItem("completed"))||defaultCompleted
render()
}

function save(){
localStorage.setItem("queue",JSON.stringify(queue))
localStorage.setItem("completed",JSON.stringify(completed))
}

/* RENDER */

function render(){

const q=document.getElementById("queue")
const c=document.getElementById("completed")

q.innerHTML=""
c.innerHTML=""

/* QUEUE */

queue.forEach((game,i)=>{

const card=document.createElement("div")
card.className="card"

let tagHTML=""

game.tags.forEach(t=>{
tagHTML+=`<span class="${t}">${t.replace("_"," ")}</span>`
})

card.innerHTML=`
<div>
<div>${game.name}</div>
<div class="tags">${tagHTML}</div>
</div>

<div class="controls">

<button class="moveBtn" onclick="completeGame(${i})">✓</button>
<button onclick="editTags(${i})">🏷</button>
<button class="deleteBtn" onclick="deleteGame(${i})">✖</button>

</div>
`

q.appendChild(card)

})

/* COMPLETED */

completed.forEach((game,i)=>{

const card=document.createElement("div")
card.className="card"

let tagHTML=""

game.tags.forEach(t=>{
tagHTML+=`<span class="${t}">${t.replace("_"," ")}</span>`
})

card.innerHTML=`
<div>
<div>${game.name}</div>
<div class="tags">${tagHTML}</div>
</div>

<div class="controls">

<button class="undoBtn" onclick="undoGame(${i})">↺</button>
<button class="deleteBtn" onclick="deleteCompleted(${i})">✖</button>

</div>
`

c.appendChild(card)

})

}

/* ADD GAME */

function addGame(){

const name=document.getElementById("newName").value
let tag1=document.getElementById("tag1").value
let tag2=document.getElementById("tag2").value

if(!name) return

let tags=[tag1,tag2].filter(t=>t)

if(tags.length>2) tags=tags.slice(0,2)

/* enforce single ACTIVE */

if(tags.includes("ACTIVE")){
removeActive()
}

queue.push({name,tags})

save()
render()

document.getElementById("newName").value=""

}

/* EDIT TAGS */

function editTags(i){

let t1=prompt("Tag1: ACTIVE / EARLY_ACCESS / UNRELEASED or blank")
let t2=prompt("Tag2:")

let tags=[t1,t2].filter(t=>t)

if(tags.includes("ACTIVE")){
removeActive()
}

queue[i].tags=tags.slice(0,2)

save()
render()

}

/* REMOVE OTHER ACTIVE */

function removeActive(){

queue.forEach(g=>{
g.tags=g.tags.filter(t=>t!=="ACTIVE")
})

}

/* MOVE */

function completeGame(i){
completed.push(queue[i])
queue.splice(i,1)
save()
render()
}

function undoGame(i){
queue.push(completed[i])
completed.splice(i,1)
save()
render()
}

/* DELETE */

function deleteGame(i){
queue.splice(i,1)
save()
render()
}

function deleteCompleted(i){
completed.splice(i,1)
save()
render()
}

</script>

</body>
</html>
